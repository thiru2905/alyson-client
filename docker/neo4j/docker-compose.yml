# Local Neo4j for Alyson Knowledge Graph (knowledge-graph branch only).
# Browser: http://localhost:7474  Bolt: bolt://localhost:7687
#
#   cd docker/neo4j
#   docker compose up -d
#
services:
  neo4j:
    image: neo4j:5.26-community
    container_name: alyson-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - alyson_neo4j_data:/data
      - alyson_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  alyson_neo4j_data:
  alyson_neo4j_logs:
